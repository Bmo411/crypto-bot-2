version: '3.8'

services:
  tradingbot:
    build: .
    restart: always
    environment:
      - PAPER_MODE=true # O false para live trading
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - DB_PATH=/app/data/tradingbot.db
      # NOTA: Los siguientes valores deben ser configurados como secretos 
      # en la interfaz de Coolify (Environment Variables), no en este archivo:
      # - ALPACA_API_KEY=your_api_key
      # - ALPACA_SECRET_KEY=your_secret_key
    volumes:
      - tradingbot_data:/app/data

volumes:
  tradingbot_data:
    name: tradingbot_data_v5
